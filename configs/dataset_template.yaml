# Copy this file once per evaluation dataset. The command-line scripts use
# explicit flags; this file is a reproducibility checklist for the frozen run.

experiment: dataset_name_contribution_flow_final
seed: 20260711

data:
  name: dataset_name
  input: /path/to/retrieval_records.jsonl
  start: 0
  count: 1000
  retrieved_chunks: 5

retrieval:
  chunk_unit: token
  chunk_size_tokens: null
  chunk_overlap_tokens: null
  embedding_model: null
  embedding_fields: null
  query_instruction: null
  embedding_sequence_truncation: none
  vector_normalization: l2
  index: null
  similarity: null
  reranker: none
  top_k: 5

reader:
  backend: vllm_openai_compatible
  model_path: /data1/yujia/models/Qwen2.5-7B-Instruct
  served_model: qwen2.5-7b
  base_url: http://127.0.0.1:8000/v1
  dtype: bfloat16
  decoding: greedy
  max_new_tokens: 96
  workers: 16

annotation:
  spacy_model: en_core_web_lg
  base_url: http://127.0.0.1:8021

contribution_graph:
  backend: huggingface_sdpa_layerwise_attention_recompute
  method: direct-activation
  absorbing_flow: true
  context_truncation: none
  sequence_limit: model_context_window
  edge_topk: 6
  max_receivers_per_layer: 48
  max_edges: 5000

optimization:
  projection: layer-copy-token
  capacity_mode: raw
  solver: geometric-k-guessing
  beta: 0.1
  eta: 1.0
  gamma: 1.0

replacement:
  counterfactual_pools: /path/to/counterfactual_pools.json
  type_rules: /path/to/type_rules.yaml
  mode: fixed_point_shared_registry
  deletion_allowed: false
  require_single_token: true
  require_contextual_pos: true
  require_contextual_tag: true
  require_contextual_morphology: true
  entity_policy: same_type_same_length_same_slot

evaluation:
  native_remaining_flow_threshold: 0.2
  clean_correct_policy: exact
  final_backend: vllm_openai_compatible
  reader_workers: 16

artifacts:
  root: /data1/yujia/CausalityRAG/runs
  run_id: final-v1
  directory: /data1/yujia/CausalityRAG/runs/dataset_name/final-v1
  context_units: 01_context/context_units.jsonl
  clean_targets: 02_reader/clean_targets.jsonl
  contribution_graph: 03_graph/contribution_graph.jsonl
  contribution_flow_initial: 04_flow/initial.jsonl
  contribution_flow_final: 04_flow/final.jsonl
  replacement_registry: 05_registry/final.jsonl
  evaluation_directory: 06_evaluation
  manifest: manifest.json
