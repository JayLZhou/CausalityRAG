# Copy this file once per evaluation dataset. The command-line scripts use
# explicit flags; this file is a reproducibility checklist for the frozen run.

experiment: dataset_name_contribution_flow_final
seed: 20260711

data:
  name: dataset_name
  input: /path/to/retrieval_records.jsonl
  start: 0
  count: 1000
  retrieved_chunks: 5

reader:
  model_path: /data1/yujia/models/Qwen2.5-7B-Instruct
  served_model: qwen2.5-7b
  base_url: http://127.0.0.1:8000/v1
  attention_implementation: eager
  dtype: bfloat16
  decoding: greedy
  max_new_tokens: 96

annotation:
  spacy_model: en_core_web_lg
  base_url: http://127.0.0.1:8021

contribution_graph:
  method: direct-activation
  absorbing_flow: true
  max_context_tokens: 800
  max_length: 1024
  edge_topk: 6
  max_receivers_per_layer: 48
  max_edges: 5000

optimization:
  projection: layer-copy-token
  capacity_mode: raw
  solver: geometric-k-guessing
  beta: 0.25
  eta: 1.0
  gamma: 1.0
  max_k_guess: 0

replacement:
  counterfactual_pools: /path/to/counterfactual_pools.json
  type_rules: /path/to/type_rules.yaml
  mode: fixed_point_shared_registry
  deletion_allowed: false
  require_single_token: true
  require_contextual_pos: true
  require_contextual_tag: true
  require_contextual_morphology: true
  entity_policy: same_type_same_length_same_slot

evaluation:
  native_remaining_flow_threshold: 0.5
  clean_correct_policy: exact
  final_backend: local_hf_eager

artifacts:
  root: /data1/yujia/CausalityRAG/runs
  run_id: final-v1
  directory: /data1/yujia/CausalityRAG/runs/dataset_name/final-v1
  context_units: 01_context/context_units.jsonl
  contribution_graph: 02_graph/contribution_graph.jsonl
  contribution_flow_initial: 03_flow/initial.jsonl
  contribution_flow_final: 03_flow/final.jsonl
  replacement_registry: 04_registry/final.jsonl
  evaluation_directory: 05_evaluation
  hf_verification: 06_verification/local_hf.jsonl
  manifest: manifest.json
